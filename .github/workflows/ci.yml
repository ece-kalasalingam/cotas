name: CI

on:
  push:
  pull_request:
  schedule:
    - cron: "0 2 * * *"
  workflow_dispatch:

jobs:
  test:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            lock_file: requirements-lock-windows.txt
          - os: macos-latest
            lock_file: requirements-lock-macos.txt
          - os: ubuntu-latest
            lock_file: requirements-lock-linux.txt
    runs-on: ${{ matrix.os }}
    env:
      FOCUS_WORKBOOK_PASSWORD: ${{ secrets.FOCUS_WORKBOOK_PASSWORD }}
      QT_QPA_PLATFORM: offscreen
      PYTHONFAULTHANDLER: "1"
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Install Linux system dependencies for Qt
        if: matrix.os == 'ubuntu-latest'
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            libegl1 \
            libgl1 \
            libopengl0 \
            libxkbcommon-x11-0 \
            libdbus-1-3 \
            libfontconfig1

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip setuptools
          pip install -r ${{ matrix.lock_file }}

      - name: Dependency vulnerability audit
        run: python -m pip_audit

      - name: SAST (Bandit)
        run: python -m bandit -q -c .bandit.yaml -r common modules services

      - name: Ruff
        run: python -m ruff check .

      - name: isort
        run: python -m isort --check-only --diff .

      - name: Pyright
        run: python -m pyright

      - name: Run quality gate
        run: python scripts/quality_gate.py --mode fast

  perf:
    if: github.event_name == 'pull_request' || github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'
    continue-on-error: true
    runs-on: ubuntu-latest
    env:
      QT_QPA_PLATFORM: offscreen
      PYTHONFAULTHANDLER: "1"
      RUN_PERF_TESTS: "1"
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Install Linux system dependencies for Qt
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            libegl1 \
            libgl1 \
            libopengl0 \
            libxkbcommon-x11-0 \
            libdbus-1-3 \
            libfontconfig1

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip setuptools
          pip install -r requirements-lock-linux.txt

      - name: Run performance regression tests (non-blocking)
        run: python -m pytest -q tests/perf
